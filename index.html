<!doctype html>
<html lang="en" data-theme="paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hard Materials, Honest Errors — a meta-review of AI and ab initio simulation errors in nine classes of high-value hard materials, and the discovery roadmap they imply. 23 chapters, 475 references, research date 2026-07-17."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Apply the persisted reading theme before first paint (paper | sepia | ink).
      (function () {
        try {
          var t = localStorage.getItem('hmhe:theme');
          if (t !== 'sepia' && t !== 'ink') t = 'paper';
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'paper';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Hard Materials, Honest Errors</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
