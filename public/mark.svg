<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" role="img" aria-label="Error-bar monogram">
<!-- Error-bar monogram — "Hard Materials, Honest Errors": a horizontal whisker rule with end ticks and a rust center square; honest errors, quantified. -->
<g stroke="#221E17" stroke-width="1.5" stroke-linecap="square">
<line x1="3.25" y1="12" x2="20.75" y2="12"/>
<line x1="3.25" y1="8" x2="3.25" y2="16"/>
<line x1="20.75" y1="8" x2="20.75" y2="16"/>
</g>
<rect x="10.25" y="10.25" width="3.5" height="3.5" fill="#A34E21"/>
</svg>
